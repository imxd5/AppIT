<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Arial", sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .login-box {
      width: 350px;
      background: white;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #5568d3;
    }

    .register {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .register a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>เข้าสู่ระบบ</h2>

    <form>
      <div class="input-group">
        <label>อีเมล</label>
        <input type="email" placeholder="กรอกอีเมล">
      </div>

      <div class="input-group">
        <label>รหัสผ่าน</label>
        <input type="password" placeholder="กรอกรหัสผ่าน">
      </div>

      <button type="submit">
        เข้าสู่ระบบ
      </button>

      <div class="register">
        ยังไม่มีบัญชี?
        <a href="/register.html">สมัครสมาชิก</a>
      </div>
    </form>
  </div>

</body>
</html>
