<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b3e68,#4a1cc8);

}

.login-box{
    width:380px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-control{
    height:45px;
}

.btn-login{
    width:100%;
    height:45px;
    background:#4e73df;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
}

.btn-login:hover{
    background:#2e59d9;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">

    <h2>เข้าสู่ระบบ</h2>

    <form action="#" method="post">

        <div class="mb-3">
            <label>อีเมล</label>
            <input type="email" class="form-control" placeholder="กรอกอีเมล">
        </div>

        <div class="mb-3">
            <label>รหัสผ่าน</label>
            <input type="password" class="form-control" placeholder="กรอกรหัสผ่าน">
        </div>

        <button class="btn-login">
            เข้าสู่ระบบ
        </button>

    </form>

    <div class="register">
        ยังไม่มีบัญชี?
        <a href="register.html">สมัครสมาชิก</a>
    </div>

</div>

</body>
</html>
