<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login System</title>
</head>

<body>

    <center>

        <h1>Welcome Back</h1>
        <p>กรุณาเข้าสู่ระบบเพื่อใช้งาน</p>

        <form>

            <table border="1" cellpadding="10">

                <tr>
                    <td>
                        <label>Username</label>
                    </td>
                    <td>
                        <input 
                            type="text" 
                            placeholder="Enter username">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label>Password</label>
                    </td>
                    <td>
                        <input 
                            type="password" 
                            placeholder="Enter password">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="checkbox">
                        Remember me
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <button type="submit">
                            Login
                        </button>
                    </td>
                </tr>

            </table>

        </form>

        <br>

        <a href="#">Forgot Password?</a>
        <br>
        <p>
            Don't have an account?
            <a href="#">Register</a>
        </p>

    </center>

</body>
</html>
